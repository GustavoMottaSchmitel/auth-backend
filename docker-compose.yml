version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ata_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: eligibility_db
    ports:
      - "5432:5432"
    volumes:
      - ata_postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    restart: unless-stopped

volumes:
  ata_postgres_data:
