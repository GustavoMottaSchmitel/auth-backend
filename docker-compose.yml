version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ata_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eligibility_db
    ports:
      - "5432:5432"
    volumes:
      - ata_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  ata_postgres_data:
